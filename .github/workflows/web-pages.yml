name: Web → GitHub Pages

# Godot 无头导出 Web（gl_compatibility + 无线程，适配 GitHub Pages 无 COOP/COEP 头），
# 产物用官方 Pages Action 部署。push main 或手动触发。
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  GODOT_VERSION: "4.6.3"

jobs:
  export:
    name: Export Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Godot + web export templates
        run: |
          set -eo pipefail
          BASE="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable"
          curl -sSL -o godot.zip "$BASE/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          curl -sSL -o templates.tpz "$BASE/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          unzip -q godot.zip
          sudo mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          TPL="$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          mkdir -p "$TPL"
          unzip -q templates.tpz
          mv templates/* "$TPL/"
          godot --version

      - name: Import project
        run: godot --headless --import

      - name: Export Web
        run: |
          set -eo pipefail
          mkdir -p build/web
          godot --headless --export-release "Web" build/web/index.html
          test -f build/web/index.html
          ls -la build/web

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    name: Deploy Pages
    needs: export
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
