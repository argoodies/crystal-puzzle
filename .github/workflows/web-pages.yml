name: Web → crystal-puzzle-web Pages

# Godot 无头导出 Web（gl_compatibility + 无线程，适配 GitHub Pages 无 COOP/COEP 头）。
# 源码仓库(crystal-puzzle)可私有；产物跨仓库推到公开的 crystal-puzzle-web 的 gh-pages 分支托管。
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  export:
    name: Export Web & Deploy
    runs-on: ubuntu-latest
    env:
      GODOT_VERSION: "4.6.3"
    steps:
      - uses: actions/checkout@v4

      - name: Install Godot + web export templates
        run: |
          set -eo pipefail
          BASE="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable"
          curl -sSL -o godot.zip "$BASE/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          curl -sSL -o templates.tpz "$BASE/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          unzip -q godot.zip
          sudo mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          TPL="$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          mkdir -p "$TPL"
          unzip -q templates.tpz
          mv templates/* "$TPL/"
          godot --version

      - name: Import project
        run: godot --headless --import

      - name: Export Web
        run: |
          set -eo pipefail
          mkdir -p build/web
          godot --headless --export-release "Web" build/web/index.html
          test -f build/web/index.html
          touch build/web/.nojekyll
          ls -la build/web

      - name: Deploy to crystal-puzzle-web (gh-pages)
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PAGES_PAT }}
          external_repository: argoodies/crystal-puzzle-web
          publish_branch: gh-pages
          publish_dir: build/web
          cname: ""
